<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marathon Training 2026 — Garrett</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon: #39FF14;
      --neon-dim: rgba(57, 255, 20, 0.15);
      --neon-glow: 0 0 10px rgba(57,255,20,0.6), 0 0 25px rgba(57,255,20,0.25);
      --black: #0a0a0a;
      --card: #111111;
      --card-border: #1f1f1f;
      --off-white: #F0EBE3;
      --muted: #888888;
      --very-muted: #3a3a3a;
    }

    body {
      font-family: 'Barlow', -apple-system, sans-serif;
      background: var(--black);
      color: var(--off-white);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background:
        linear-gradient(180deg, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.92) 100%),
        url('https://images.unsplash.com/photo-1571008887538-b36bb32f4571?w=1400&auto=format&fit=crop&q=80') center/cover no-repeat;
      color: var(--off-white);
      padding: 1.5rem 1.5rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--card-border);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .header-title h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 2px;
      color: var(--off-white);
      line-height: 1;
    }

    .header-title p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.3rem;
      letter-spacing: 0.04em;
    }

    .countdown-cards { display: flex; gap: 0.6rem; }

    .countdown-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--card-border);
      border-radius: 0.5rem;
      padding: 0.5rem 0.9rem;
      text-align: center;
      min-width: 70px;
    }

    .countdown-card .days {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--neon);
      line-height: 1;
      text-shadow: var(--neon-glow);
    }

    .countdown-card .label {
      font-size: 0.58rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.2rem;
    }

    /* ── ALERT BANNER ── */
    .alert-banner {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.65rem 0.9rem;
      background: var(--neon-dim);
      border: 1px solid rgba(57,255,20,0.25);
      border-radius: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .alert-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }

    .alert-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--neon);
      margin-bottom: 0.1rem;
    }

    .alert-message { font-size: 0.82rem; color: var(--muted); line-height: 1.4; }

    /* ── NAV TABS ── */
    nav { display: flex; overflow-x: auto; scrollbar-width: none; }
    nav::-webkit-scrollbar { display: none; }

    nav button {
      font-family: 'Bebas Neue', sans-serif;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      padding: 0.75rem 1.1rem;
      font-size: 1rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s;
    }

    nav button:hover { color: var(--off-white); }

    nav button.active {
      color: var(--neon);
      border-bottom-color: var(--neon);
    }

    /* ── MAIN ── */
    main { max-width: 1140px; margin: 0 auto; padding: 1.5rem; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 0.75rem;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 1px;
      color: var(--off-white);
      margin-bottom: 0.15rem;
    }

    .card-subtitle { font-size: 0.78rem; color: var(--muted); margin-bottom: 1rem; }

    /* ── PHASE BADGE ── */
    .phase-badge {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border-radius: 3px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
    }

    /* ── WORKOUT TYPE BADGE ── */
    .wtype {
      display: inline-block;
      padding: 0.12rem 0.5rem;
      border-radius: 3px;
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.35rem;
    }

    /* ── THIS WEEK ── */
    .week-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .week-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      color: var(--neon);
      line-height: 1;
      text-shadow: var(--neon-glow);
    }

    .week-meta { flex: 1; }

    .week-meta h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 1px;
      color: var(--off-white);
    }

    .week-meta p { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }

    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.5rem;
    }

    @media (max-width: 900px) { .day-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 560px) { .day-grid { grid-template-columns: repeat(2, 1fr); } }

    .day-card {
      border: 1px solid var(--card-border);
      border-radius: 0.5rem;
      padding: 0.75rem;
      position: relative;
      min-height: 120px;
      background: #0f0f0f;
    }

    .day-card.is-today {
      border-color: var(--neon);
      background: rgba(57,255,20,0.05);
      box-shadow: 0 0 15px rgba(57,255,20,0.1);
    }

    .today-pip {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--neon);
      color: #000;
      font-size: 0.55rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      padding: 0.15rem 0.55rem;
      border-radius: 2px;
      white-space: nowrap;
    }

    .day-card.is-rest { opacity: 0.45; }

    .day-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.1rem;
    }

    .day-date { font-size: 0.7rem; color: var(--very-muted); margin-bottom: 0.4rem; }

    .day-workout { font-size: 0.78rem; font-weight: 500; color: var(--off-white); line-height: 1.4; }

    .day-extra {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.3rem;
      padding-top: 0.3rem;
      border-top: 1px solid var(--card-border);
    }

    .day-miles {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      color: var(--neon);
      margin-top: 0.4rem;
      letter-spacing: 0.05em;
    }

    /* ── FULL PLAN TABLE ── */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }

    th {
      background: #000;
      color: var(--muted);
      padding: 0.55rem 0.7rem;
      text-align: left;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    td {
      padding: 0.55rem 0.7rem;
      border-bottom: 1px solid var(--card-border);
      vertical-align: top;
      line-height: 1.5;
      color: var(--off-white);
    }

    tr:hover td { background: rgba(255,255,255,0.02); }
    tr.current-week td { background: rgba(57,255,20,0.04); }

    .td-workout { max-width: 150px; min-width: 110px; }

    /* ── PACE TABLE ── */
    .effort-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 0.4rem;
      flex-shrink: 0;
    }

    /* ── COACHING NOTES ── */
    .coaching-note {
      font-size: 0.82rem;
      padding: 0.5rem 0.75rem;
      background: #0f0f0f;
      border: 1px solid var(--card-border);
      border-radius: 0.4rem;
      margin-bottom: 0.4rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── NUTRITION ── */
    .section-header {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: var(--neon);
      margin: 1.5rem 0 0.6rem;
    }

    .section-header:first-child { margin-top: 0; }

    .nutrition-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.75rem;
    }

    .nutrition-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-left: 3px solid;
      border-radius: 0.5rem;
      padding: 1rem;
    }

    .nutrition-card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      color: var(--off-white);
      margin-bottom: 0.2rem;
    }

    .nutrition-target {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      white-space: pre-line;
      line-height: 1.3;
    }

    .nutrition-why { font-size: 0.75rem; color: var(--muted); }

    .nutrition-sources {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--card-border);
    }

    /* ── TIMELINE ── */
    .timeline { position: relative; padding-left: 1.4rem; }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0.35rem;
      top: 0.5rem;
      bottom: 0;
      width: 1px;
      background: var(--card-border);
    }

    .timeline-item { position: relative; padding: 0.5rem 0; }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -1.05rem;
      top: 0.85rem;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 6px rgba(57,255,20,0.8);
    }

    .timeline-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: var(--neon);
    }

    .timeline-action { font-size: 0.83rem; color: var(--muted); line-height: 1.4; }

    /* ── PRINCIPLES ── */
    .principle {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      padding: 0.7rem 0.75rem;
      background: #0f0f0f;
      border: 1px solid var(--card-border);
      border-radius: 0.4rem;
      margin-bottom: 0.4rem;
      font-size: 0.83rem;
      line-height: 1.5;
      color: var(--muted);
    }

    .principle-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem;
      color: #000;
      background: var(--neon);
      width: 22px;
      height: 22px;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── STATS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 0.5rem;
      padding: 1rem;
      text-align: center;
    }

    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: var(--neon);
      line-height: 1;
      text-shadow: var(--neon-glow);
    }

    .stat-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-top: 0.25rem;
    }

    /* ── PRE-TRAINING ── */
    .pre-training { text-align: center; padding: 2.5rem 1rem; }

    .pre-big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 6rem;
      color: var(--neon);
      line-height: 1;
      text-shadow: var(--neon-glow);
    }

    .pre-training h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 1px;
      color: var(--off-white);
      margin: 0.5rem 0 0.25rem;
    }

    .pre-training p { color: var(--muted); font-size: 0.88rem; }

    /* ── CHART LEGEND ── */
    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--card-border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .legend-dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--very-muted); border-radius: 2px; }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 0.5rem;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .progress-labels { flex: 1; min-width: 160px; }
    .progress-title { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; letter-spacing: 0.1em; color: var(--muted); }
    .progress-nums  { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--off-white); line-height: 1; }
    .progress-nums span { color: var(--neon); text-shadow: var(--neon-glow); }

    .progress-bar-wrap { flex: 2; min-width: 180px; }
    .progress-bar-track {
      background: var(--very-muted);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--neon);
      box-shadow: 0 0 8px rgba(57,255,20,0.5);
      transition: width 0.4s ease;
    }
    .progress-pct { font-size: 0.72rem; color: var(--muted); margin-top: 0.3rem; }

    /* ── LOG BUTTON ── */
    .log-btn {
      display: block;
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.3rem 0;
      border-radius: 3px;
      border: 1px solid var(--card-border);
      background: transparent;
      color: var(--muted);
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .log-btn:hover { border-color: var(--neon); color: var(--neon); }
    .log-btn.done  { background: var(--neon-dim); border-color: var(--neon); color: var(--neon); }
    .day-card.is-done { border-color: rgba(57,255,20,0.3); }

    /* ── TOOLS TAB ── */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
    }

    .form-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 0.4rem;
      display: block;
    }

    .input-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }

    .tools-input {
      flex: 1;
      background: #0f0f0f;
      border: 1px solid var(--card-border);
      border-radius: 0.4rem;
      color: var(--off-white);
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      padding: 0.5rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .tools-input:focus { border-color: var(--neon); }

    .tools-select {
      background: #0f0f0f;
      border: 1px solid var(--card-border);
      border-radius: 0.4rem;
      color: var(--off-white);
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      padding: 0.5rem 0.5rem;
      outline: none;
    }

    .tools-btn {
      background: var(--neon);
      color: #000;
      border: none;
      border-radius: 0.4rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      padding: 0 1rem;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .tools-btn:hover { opacity: 0.85; }
    .tools-btn.secondary {
      background: transparent;
      border: 1px solid var(--neon);
      color: var(--neon);
    }

    .tools-result {
      background: #0f0f0f;
      border: 1px solid var(--card-border);
      border-radius: 0.4rem;
      padding: 0.75rem;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .tools-result .result-highlight {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--neon);
      text-shadow: var(--neon-glow);
      display: block;
      margin-bottom: 0.25rem;
    }

    .weather-display {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: #0f0f0f;
      border: 1px solid var(--card-border);
      border-radius: 0.4rem;
      margin-top: 0.75rem;
    }

    .weather-temp {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: var(--neon);
      text-shadow: var(--neon-glow);
      line-height: 1;
    }

    .weather-adj {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .weather-adj strong { color: var(--off-white); }

    .adj-badge {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-top: 0.2rem;
    }

    .profile-saved {
      font-size: 0.75rem;
      color: var(--neon);
      margin-top: 0.3rem;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-title">
      <h1>🏃 Marathon Training 2026</h1>
      <p>Sub-3:40 Goal &nbsp;·&nbsp; Race Day: Sun Aug 23, 2026</p>
    </div>
    <div class="countdown-cards">
      <div class="countdown-card">
        <div class="days" id="days-to-race">—</div>
        <div class="label">Days to Race</div>
      </div>
      <div class="countdown-card">
        <div class="days" id="second-counter">—</div>
        <div class="label" id="second-label">Days to Start</div>
      </div>
    </div>
  </div>

  <div class="alert-banner">
    <div class="alert-icon" id="alert-icon">💡</div>
    <div>
      <div class="alert-label" id="alert-label">Today's Tip</div>
      <div class="alert-message" id="alert-message">Loading…</div>
    </div>
  </div>

  <nav>
    <button class="active" onclick="showTab('this-week', this)">This Week</button>
    <button onclick="showTab('full-plan', this)">Full Plan</button>
    <button onclick="showTab('paces', this)">Pace Guide</button>
    <button onclick="showTab('nutrition', this)">Nutrition</button>
    <button onclick="showTab('mileage', this)">Mileage</button>
    <button onclick="showTab('tools', this)">Tools</button>
  </nav>
</header>

<main>
  <div id="this-week" class="tab-panel active"></div>
  <div id="full-plan" class="tab-panel"></div>
  <div id="paces"     class="tab-panel"></div>
  <div id="nutrition" class="tab-panel"></div>
  <div id="mileage"   class="tab-panel"></div>
  <div id="tools"     class="tab-panel"></div>
</main>

<script>
// ================================================================
// DATA
// ================================================================

const RACE_DATE      = new Date('2026-08-23');
const TRAINING_START = new Date('2026-05-04');

const PHASE = {
  'Base':      { bg: '#0d1f3c', color: '#60a5fa' },

const state = {

  set completed(v)  { localStorage.setItem('mtp_completed',   JSON.stringify(v)); },

  set weight(v)     { localStorage.setItem('mtp_weight',      String(v)); },
  get weightUnit()  { return localStorage.getItem('mtp_weight_unit')            || 'lbs'; },
  set weightUnit(v) { localStorage.setItem('mtp_weight_unit', v); },
  get weatherKey()  { return localStorage.getItem('mtp_weather_key')            || ''; },
  set weatherKey(v) { localStorage.setItem('mtp_weather_key', v); },
};

// Convert stored weight to kg for all calculations
function weightKg() {
  if (!state.weight) return 0;
  return state.weightUnit === 'lbs' ? state.weight / 2.205 : state.weight;
}

// ── WORKOUT LOGGER ──────────────────────────────────────────────

function workoutKey(weekNum, day) { return `${weekNum}-${day}`; }

function isDone(weekNum, day) {
  return state.completed.includes(workoutKey(weekNum, day));
}

function toggleWorkout(weekNum, day) {
  const key  = workoutKey(weekNum, day);
  const list = state.completed;
  const idx  = list.indexOf(key);
  if (idx === -1) list.push(key); else list.splice(idx, 1);
  state.completed = list;
  renderThisWeek();         // refresh the week view
  renderProgressBar();      // refresh the bar
}

// ── PROGRESS BAR ────────────────────────────────────────────────

function renderProgressBar() {
  const ts  = getTrainingState();
  const bar = document.getElementById('progress-bar-wrap');
  if (!bar || ts.state !== 'training') return;

  const week       = ts.week;
  const totalMiles = week.totalMiles;
  const doneMiles  = DAYS
    .filter(d => isDone(week.week, d) && week[d].miles > 0)
    .reduce((sum, d) => sum + week[d].miles, 0);
  const pct = totalMiles > 0 ? Math.min(100, Math.round((doneMiles / totalMiles) * 100)) : 0;

  bar.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-labels">
        <div class="progress-title">This Week's Miles</div>
        <div class="progress-nums"><span>${doneMiles}</span> / ${totalMiles} mi</div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
        <div class="progress-pct">${pct}% complete · ${DAYS.filter(d => isDone(week.week, d) && week[d].miles > 0).length} of ${DAYS.filter(d => week[d].miles > 0).length} runs logged</div>
      </div>
    </div>`;
}

// ── WEATHER ─────────────────────────────────────────────────────

let weatherCache = null;   // { temp, humidity, desc, adj, fetched }

function heatAdjustment(tempF, humidity) {
  let adj = 0;
  if (tempF >= 85)      adj += 45;
  else if (tempF >= 80) adj += 30;
  else if (tempF >= 75) adj += 20;
  else if (tempF >= 70) adj += 15;
  else if (tempF >= 65) adj += 10;
  else if (tempF >= 60) adj += 5;
  if (humidity >= 80)   adj += 10;
  else if (humidity >= 70) adj += 5;
  return adj;
}

function adjColor(adj) {
  if (adj === 0)  return '#4ade80';
  if (adj <= 10)  return '#fbbf24';
  if (adj <= 25)  return '#fb923c';
  return '#f87171';
}

function adjLabel(adj) {
  if (adj === 0)  return '✓ No adjustment needed';
  if (adj <= 10)  return `+${adj} sec/mi — mild heat`;
  if (adj <= 25)  return `+${adj} sec/mi — add caution`;
  return `+${adj} sec/mi — run easy or move indoors`;
}

async function fetchWeather() {
  if (!state.weatherKey) return;
  return new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(async pos => {
      try {
        const { latitude: lat, longitude: lon } = pos.coords;
        const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${state.weatherKey}&units=imperial`;
        const res  = await fetch(url);
        const data = await res.json();
        if (data.cod !== 200) { resolve(null); return; }
        const temp     = Math.round(data.main.temp);
        const humidity = data.main.humidity;
        const desc     = data.weather[0].description;
        const adj      = heatAdjustment(temp, humidity);
        weatherCache   = { temp, humidity, desc, adj, city: data.name, fetched: new Date() };
        resolve(weatherCache);
      } catch { resolve(null); }
    }, () => resolve(null));
  });
}

function calcSweatRate() {
  const pre  = parseFloat(document.getElementById('sweat-pre').value);
  const post = parseFloat(document.getElementById('sweat-post').value);

  const drank = parseFloat(document.getElementById('sweat-drank').value) || 0;
  if (!pre || !post || !dur) return;

  const lostLbs   = pre - post;
  const lostOz    = lostLbs * 16;
  const totalLost = lostOz + drank;                  // total sweat (oz)
  const ratePerHr = Math.round(totalLost / (dur / 60));
  const rehydrate = Math.round(lostOz * 1.5);        // 150% rule
  const perMile   = dur > 0 ? Math.round(totalLost / (dur / 60) / (dur / 60)) : 0;

  document.getElementById('sweat-result').innerHTML = `

      <span class="result-highlight">${ratePerHr} oz/hr sweat rate</span>

}

function daysBetween(a, b) {
  const ms = b - a;
  return Math.floor(ms / (1000 * 60 * 60 * 24));
}

function fmtDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function phaseBadge(phase, small) {
  const s = PHASE[phase] || PHASE['Base'];
  const fs = small ? 'font-size:0.62rem;' : '';
  return `<span class="phase-badge" style="background:${s.bg};color:${s.color};${fs}">${phase}</span>`;
}

function wtypeBadge(type) {
  const w = WTYPE[type] || WTYPE.easy;
  return `<span class="wtype" style="background:${w.bg};color:${w.color}">${w.label}</span>`;
}

// Figure out which training week we're in (0-indexed), and what day name today is.
function getTrainingState() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const start = new Date(TRAINING_START);
  start.setHours(0,0,0,0);
  const diff = daysBetween(start, today);

  if (diff < 0) return { state:'pre', daysUntilStart: -diff };
  if (diff >= 16 * 7) return { state:'post' };

  const weekIdx = Math.floor(diff / 7);
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const todayName = dayNames[today.getDay()];
  return { state:'training', weekIdx, week: weeks[weekIdx], todayName };
}

function getAlert(ts) {
  if (ts.state === 'pre') {
    const d = ts.daysUntilStart;
    return { icon:'🗓️', label:`Training starts in ${d} day${d!==1?'s':''}`, message:'Use this time to dial in your pre-run breakfast, get consistent sleep, and review the full plan below.' };
  }
  if (ts.state === 'post') {
    return { icon:'🏅', label:'Race Complete!', message:'You ran a marathon. Rest, recover, and be proud of yourself.' };
  }
  const { week, todayName } = ts;
  const day = week[todayName];
  if (!day) return { icon:'📅', label:'Training Day', message:'Check your plan.' };
  const map = {
    rest:      { icon:'😴', label:'Rest Day',           message:'Recovery is where adaptation happens. Eat plenty of protein + carbs, drink 3L water, sleep 8+ hours.' },
    easy:      { icon:'🟢', label:'Easy Run Day',        message:'Keep it truly conversational pace. Eat normally. 3–4L water today. Light carb snack 1 hr before if running over 60 min.' },
    long:      { icon:'🔵', label:'Long Run Day!',       message:'Eat 80–100g carbs 2 hrs before. Bring 1 gel per 45 min of running. Have your recovery meal planned before you leave.' },
    intervals: { icon:'🟠', label:'Interval Day',        message:'Quality workout! Eat a carb-rich meal 2 hrs before. Stay well hydrated. Recovery shake within 30 min of finishing.' },
    vo2:       { icon:'🔴', label:'VO2 Max Day',         message:'Hardest session of the week. Carbs 2 hrs before. Take those 3-min jog recoveries seriously. Protein + carbs within 30 min post-run.' },
    tempo:     { icon:'🟣', label:'Tempo Day',           message:'Comfortably hard for the tempo miles. Fuel up 2 hrs before. Do not skip the cool-down jog.' },
    mp:        { icon:'🔷', label:'Marathon Pace Day',   message:'Practice your race-day effort and fueling. Eat what you would eat race morning. Hit 8:23/mi for MP segments.' },
    race:      { icon:'🏁', label:'RACE DAY — Sub-3:40!',message:'Follow your practiced plan. Bagel + PB + banana 3 hrs before. Gel at miles 5, 10, 14–15, 19–20. Drink at every aid station after mile 4.' },
  };
  return map[day.type] || map.easy;
}

function weekCard(week, todayName) {
  const start = new Date(week.weekOf);
  const end   = new Date(start); end.setDate(end.getDate() + 6);

  const cells = DAYS.map((day, i) => {
    const d = week[day];
    const dayDate = new Date(start); dayDate.setDate(dayDate.getDate() + i);
    const isToday = day === todayName;
    const isRest  = d.type === 'rest';

    let cls = 'day-card';
    if (isToday) cls += ' is-today';
    if (isRest)  cls += ' is-rest';

    return `<div class="${cls}">
      ${isToday ? '<div class="today-pip">TODAY</div>' : ''}
      <div class="day-name">${day}</div>
      <div class="day-date">${dayDate.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
      ${wtypeBadge(d.type)}
      <div class="day-workout">${d.workout}</div>
      ${d.extra ? `<div class="day-extra">+ ${d.extra}</div>` : ''}
      ${d.miles > 0 ? `<div class="day-miles">${d.miles} mi</div>` : ''}
      ${d.type !== 'rest' ? `<button class="log-btn ${isDone(week.week, day) ? 'done' : ''}" onclick="toggleWorkout(${week.week},'${day}')">${isDone(week.week, day) ? '✓ Done' : 'Mark Done'}</button>` : ''}
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="week-header">
      <div class="week-num">${week.week}</div>
      <div class="week-meta">
        <h2>Week ${week.week} of 16 &mdash; ${week.phase}</h2>
        <p>${fmtDate(week.weekOf)} &ndash; ${fmtDate(end.toISOString().split('T')[0])} &nbsp;·&nbsp; ${week.totalMiles} miles this week</p>
      </div>
      ${phaseBadge(week.phase)}
    </div>
    <div class="day-grid">${cells}</div>
  </div>`;
}

  const ctx = document.getElementById('mileage-chart').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: weeks.map(w => `Wk ${w.week}`),
      datasets: [{
        data: weeks.map(w => w.totalMiles),
        backgroundColor: weeks.map(w => PHASE_CHART_COLORS[w.phase] + 'cc'),
        borderColor:     weeks.map(w => PHASE_CHART_COLORS[w.phase]),
        borderWidth: 2,
        borderRadius: 5,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const w = weeks[ctx.dataIndex];
              return [`${ctx.raw} miles`, `Phase: ${w.phase}`];
            }
          }
        }
      },
      scales: {
        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { color: '#64748b' } },
        x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 11 } } },
      }
    }
  });
}

// ================================================================
// TAB SWITCHING
// ================================================================

function showTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// INIT
// ================================================================

renderCountdowns();
renderAlert();
renderThisWeek();
renderFullPlan();
renderPaces();
renderNutrition();
renderMileage();
renderTools();

// Auto-fetch weather on load if API key is already saved
if (state.weatherKey) {
  fetchWeather().then(w => {
    if (w) { renderPaces(); renderWeatherDisplay('weather-result'); }
  });
}
</script>
